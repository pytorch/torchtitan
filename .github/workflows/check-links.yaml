name: Check Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: link-check-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mistune pytest pytest-check-links pytest-timeout pytest-xdist

      - name: Check links
        run: |
          # 1. Create a temporary conftest.py to handle 403/429/503s.
          # With these errors the link is technically correct,
          # but can be blocked by e.g. CloudFlare.

          cat <<EOF > conftest.py
          import pytest

          @pytest.hookimpl(hookwrapper=True)
          def pytest_runtest_makereport(item, call):
              outcome = yield
              report = outcome.get_result()

              if report.when == "call" and report.failed:
                  error_text = str(report.longrepr)
                  # Handle 403 (Forbidden), 429 (Rate Limit), and 503 (Overloaded/Bot Block)
                  if any(code in error_text for code in ["403", "429", "503", "'Connection reset'"]):
                      report.outcome = "passed"
                      report.wasxfail = f"Silenced transient error: {item.name}"
                      report.longrepr = None
          EOF

          # 2. Find markdown files (skip hidden folders)
          FILES=$(find . -name "*.md" -not -path "*/.*")

          # 3. Run pytest
          pytest -v \
            -p no:python \
            -n auto \
            --check-links \
            --timeout 10 \
            --check-links-ignore "http://localhost:.*" \
            $FILES

          # 4. Cleanup
          rm conftest.py
