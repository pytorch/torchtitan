name: Check Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: link-check-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          # --accept: treats 403, 429, 503 as successful (ignores Cloudflare/Rate limits)
          # --exclude: ignores localhost and internal patterns
          # --max-retries: handles temporary "Connection reset" or 503s
          # --user-agent: mimics a browser to reduce 403 Forbidden errors
          args: >
            --verbose
            --no-progress
            --accept 200,403,429,503
            --exclude "http://localhost:.*"
            --exclude "http://127.0.0.1:.*"
            --max-retries 3
            --retry-wait-time 5
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
            --root-dir .
            "**/*.md"
        env:
          # By passing the GITHUB_TOKEN, Lychee uses the official GitHub API to check
          # any github.com links. This drastically reduces the 429/503 "Rate Limit" errors
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
