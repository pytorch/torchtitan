name: RL Unified 2 GPU Integration Tests

on:
  push:
    branches: [ main ]
    tags:
      - ciflow/8gpu/*
    paths:
      - 'torchtitan/experiments/rl/unified/**'
      - '.github/workflows/integration_test_2gpu_rl_unified.yaml'
  pull_request:
    paths:
      - 'torchtitan/experiments/rl/unified/**'
      - '.github/workflows/integration_test_2gpu_rl_unified.yaml'
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'

concurrency:
  group: unit-test${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -l -eo pipefail {0}

permissions:
      id-token: write
      contents: read

jobs:
  # Step 1: Dynamically compute the matrix based on conditions
  set-matrix:
    uses: ./.github/workflows/set-matrix.yaml

  # Step 2: Use the dynamic matrix in the build-test job
  build-test:
    needs: set-matrix
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    with:
      runner: ${{ matrix.runner }}
      gpu-arch-type: ${{ matrix.gpu-arch-type }}
      gpu-arch-version: ${{ matrix.gpu-arch-version }}
      docker-image: ${{ matrix.docker-image }}
      repository: pytorch/torchtitan
      upload-artifact: outputs
      timeout: 45
      script: |
        set -eux

        # The generic Linux job chooses to use base env, not the one setup by the image
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        # Log CUDA driver version for debugging.
        DRIVER_VERSION=$(nvidia-smi --query-gpu=driver_version --format=csv,noheader | head -n 1 || true)
        echo "CUDA driver version: ${DRIVER_VERSION}"

        pip config --user set global.progress_bar off

        if [ "${{ matrix.gpu-arch-type }}" = "rocm" ]; then
          python -m pip install --force-reinstall --pre \
            "torch==${{ matrix.torch-version }}" \
            --index-url ${{ matrix.index-url }}
        else
          python -m pip install --force-reinstall --pre \
            torch --index-url ${{ matrix.index-url }}
        fi

        # Install RL dependencies: vLLM, monarch, flash-attn-3
        pip install --pre vllm xformers --extra-index-url ${{ matrix.index-url }}
        pip install torchmonarch
        pip install flash-attn-3 --extra-index=https://download.pytorch.org/whl/test/cu126

        # Download Qwen3-0.6B checkpoint
        python scripts/download_hf_assets.py \
          --repo_id Qwen/Qwen3-0.6B \
          --local_dir torchtitan/experiments/rl/example_checkpoint/Qwen3-0.6B \
          --all

        # Run the attention numerics test (2 GPU, TP=2)
        torchrun --nproc-per-node=2 \
          torchtitan/experiments/rl/unified/tests/test_attn_numerics.py
