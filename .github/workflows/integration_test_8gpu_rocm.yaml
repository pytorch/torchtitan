name: 8 GPU Integration Test on ROCm

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'torchtitan/experiments/**'
  pull_request:
    types: [labeled, synchronize]
    branches: [ main ]
    paths-ignore:
      - 'torchtitan/experiments/**'
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'

concurrency:
  group: unit-test${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -l -eo pipefail {0}

permissions:
  id-token: write
  contents: read

jobs:
  # Step 1: Dynamically compute the matrix based on conditions. This workflow
  # only runs the ROCm entry; the CUDA (H100) entry of the same test suite runs
  # in integration_test_8gpu_h100.yaml on linux_job_v3.
  set-matrix:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ciflow/h100.8')
    uses: ./.github/workflows/set-matrix.yaml
    with:
      gpu-arch: rocm

  # Step 2: ROCm runner uses linux_job_v2. The bare image name lets v2 resolve
  # and authenticate against the private ECR (unlike the full path used by v3,
  # which fails the ROCm pull with "no basic auth credentials").
  build-test:
    needs: set-matrix
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    with:
      runner: ${{ matrix.runner }}
      gpu-arch-type: ${{ matrix.gpu-arch-type }}
      gpu-arch-version: ${{ matrix.gpu-arch-version }}
      docker-image: ${{ matrix.docker-image }}
      repository: pytorch/torchtitan
      upload-artifact: outputs
      timeout: 45
      script: |
        TORCH_VERSION="${{ matrix.torch-version }}" \
        INDEX_URL="${{ matrix.index-url }}" \
        GPU_ARCH_TYPE="${{ matrix.gpu-arch-type }}" \
        bash .github/scripts/run_8xgpu_integration_tests.sh
