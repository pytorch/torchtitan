name: 8 GPU Integration Test on H100

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'torchtitan/experiments/**'
  pull_request:
    types: [labeled, synchronize]
    branches: [ main ]
    paths-ignore:
      - 'torchtitan/experiments/**'
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'

concurrency:
  group: unit-test${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -l -eo pipefail {0}

permissions:
  id-token: write
  contents: read

jobs:
  # Step 1: Dynamically compute the matrix based on conditions. This workflow
  # only runs the CUDA (H100) entry; the ROCm entry of the same test suite runs
  # in integration_test_8gpu_rocm.yaml on linux_job_v2.
  set-matrix:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ciflow/h100.8')
    uses: ./.github/workflows/set-matrix.yaml
    with:
      runner-cuda: mt-l-bx86iamx-176-1800-h100-8
      gpu-arch: cuda

  # Step 2: H100 CUDA runner uses linux_job_v3.
  build-test:
    needs: set-matrix
    uses: pytorch/test-infra/.github/workflows/linux_job_v3.yml@main
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    with:
      runner: ${{ matrix.runner }}
      gpu-arch-type: ${{ matrix.gpu-arch-type }}
      gpu-arch-version: ${{ matrix.gpu-arch-version }}
      # Private-ECR image, tagged with the .ci/docker hash from set-matrix.yaml.
      docker-image: 308535385114.dkr.ecr.us-east-1.amazonaws.com/torchtitan/${{ matrix.docker-image }}:${{ needs.set-matrix.outputs.docker-hash }}
      repository: pytorch/torchtitan
      upload-artifact: outputs
      timeout: 45
      script: |
        TORCH_VERSION="${{ matrix.torch-version }}" \
        INDEX_URL="${{ matrix.index-url }}" \
        GPU_ARCH_TYPE="${{ matrix.gpu-arch-type }}" \
        bash scripts/ci/run_8xgpu_integration_tests.sh
