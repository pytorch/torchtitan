name: Set Matrix

on:
  workflow_call:
    inputs:
      runner-rocm:
        description: 'Override default (linux.rocm.gpu.ecosystem.gfx950.8) ROCm runner label'
        required: false
        type: string
      runner-cuda:
        description: 'Override default (linux.g5.48xlarge.nvidia.gpu) CUDA runner label'
        required: false
        type: string
      cuda-linux-job-v3:
        description: 'Run the CUDA matrix entry on linux_job_v3 instead of the default linux_job_v2 (used by H100 workflows). ROCm always stays on linux_job_v2.'
        required: false
        type: boolean
        default: false
      is-experimental:
        description: 'Check if the workflow is experimental'
        required: false
        type: boolean
        default: false
    outputs:
      matrix:
        description: dynamically set matrix (all entries, regardless of reusable workflow version)
        value: ${{ jobs.set.outputs.matrix }}
      matrix-v2:
        description: Matrix entries to run on linux_job_v2 (the default; always includes ROCm)
        value: ${{ jobs.set.outputs.matrix-v2 }}
      matrix-v3:
        description: Matrix entries to run on linux_job_v3 (the CUDA entry when cuda-linux-job-v3 is true)
        value: ${{ jobs.set.outputs.matrix-v3 }}
      has-v2:
        description: Whether matrix-v2 has at least one entry ('true' or 'false')
        value: ${{ jobs.set.outputs.has-v2 }}
      has-v3:
        description: Whether matrix-v3 has at least one entry ('true' or 'false')
        value: ${{ jobs.set.outputs.has-v3 }}
      docker-hash:
        description: Git tree hash of .ci/docker, used to build the OSDC image tag
        value: ${{ jobs.set.outputs.docker-hash }}

jobs:
  set:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      matrix-v2: ${{ steps.set.outputs.matrix-v2 }}
      matrix-v3: ${{ steps.set.outputs.matrix-v3 }}
      has-v2: ${{ steps.set.outputs.has-v2 }}
      has-v3: ${{ steps.set.outputs.has-v3 }}
      docker-hash: ${{ steps.set.outputs.docker-hash }}
    env:
      # Event flags evaluated by github actions before the step runs:
      IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      IS_SCHEDULE:  ${{ github.event_name == 'schedule' }}
      IS_8GPU_TAG:  ${{ startsWith(github.ref, 'refs/tags/ciflow/8gpu/') }}
      TRIGGERED_8GPU_LABEL: ${{ github.event_name == 'pull_request' && github.event.action == 'labeled' }}

      # Default CUDA & ROCm runners
      DEFAULT_ROCM_RUNNER: linux.rocm.gpu.ecosystem.gfx950.8
      DEFAULT_CUDA_RUNNER: linux.g5.48xlarge.nvidia.gpu

      # Input CUDA & ROCm runners
      ROCM_RUNNER_INPUT: ${{ inputs.runner-rocm }}
      CUDA_RUNNER_INPUT: ${{ inputs.runner-cuda }}

    steps:
      - uses: actions/checkout@v6

      - id: set
        run: |
          set -euo pipefail

          # .ci/docker tree hash, used to build the OSDC image tag.
          DOCKER_HASH=$(git rev-parse HEAD:.ci/docker)
          echo "docker-hash=${DOCKER_HASH}" >> "$GITHUB_OUTPUT"

          # Select runner if provided, else use default value
          ROCM_RUNNER="${ROCM_RUNNER_INPUT:-$DEFAULT_ROCM_RUNNER}"
          CUDA_RUNNER="${CUDA_RUNNER_INPUT:-$DEFAULT_CUDA_RUNNER}"

          # Define ROCm matrix (empty for experimental workflows)
          if [[ "${{ inputs.is-experimental }}" == "true" ]]; then
            ROCM_MATRIX=""
          else
            ROCM_MATRIX="$(cat <<EOF
          {
            "name": "rocm",
            "runner": "${ROCM_RUNNER}",
            "gpu-arch-type": "rocm",
            "gpu-arch-version": "7.1",
            "docker-image": "torchtitan-rocm-ubuntu-22.04-clang12",
            "index-url": "https://download.pytorch.org/whl/nightly/rocm7.1",
            "torch-version": ""
          }
          EOF
          )"
          fi

          # Define CUDA matrix
          CUDA_MATRIX="$(cat <<EOF
          {
            "name": "cuda",
            "runner": "${CUDA_RUNNER}",
            "gpu-arch-type": "cuda",
            "gpu-arch-version": "13.0",
            "docker-image": "torchtitan-ubuntu-22.04-clang12",
            "index-url": "https://download.pytorch.org/whl/nightly/cu130",
            "torch-version": ""
          }
          EOF
          )"

          # Use default value as 'false' for unset environment variables
          IS_MAIN_PUSH="${IS_MAIN_PUSH:-false}"
          IS_SCHEDULE="${IS_SCHEDULE:-false}"
          IS_8GPU_TAG="${IS_8GPU_TAG:-false}"
          TRIGGERED_8GPU_LABEL="${TRIGGERED_8GPU_LABEL:-false}"

          # Decide which matrix entries to include based on event type
          # Runs ROCm only for push tag OR when PR label gets triggered
          if [[ "$IS_8GPU_TAG" == "true" || "$TRIGGERED_8GPU_LABEL" == "true" ]]; then
            cat > matrix.json <<JSON
          {"include": [$ROCM_MATRIX]}
          JSON

          # Runs CUDA and ROCm for normal PR (if PR label is present) OR for push to main, cron schedule
          elif [[ ("$IS_MAIN_PUSH" == "true" || "$IS_SCHEDULE" == "true") ]]; then
            cat > matrix.json <<JSON
          {"include": [$CUDA_MATRIX,$ROCM_MATRIX]}
          JSON

          # Runs CUDA only as default (includes normal PR, if PR label is NOT present)
          else
            cat > matrix.json <<JSON
          {"include": [$CUDA_MATRIX]}
          JSON
          fi

          # Pick the reusable workflow for each entry. linux_job_v2 is the
          # default. The CUDA entry moves to linux_job_v3 when the caller opts
          # in (H100 workflows). ROCm always stays on v2 because v3 does not
          # authenticate ROCm runners to the private ECR (the image pull fails
          # with "no basic auth credentials").
          USE_V3="${{ inputs.cuda-linux-job-v3 }}"
          USE_V3="${USE_V3:-false}"
          if [[ "$USE_V3" == "true" ]]; then
            MATRIX_V3=$(jq -c '{include: [.include[] | select(.["gpu-arch-type"] == "cuda")]}' matrix.json)
            MATRIX_V2=$(jq -c '{include: [.include[] | select(.["gpu-arch-type"] != "cuda")]}' matrix.json)
          else
            MATRIX_V3='{"include":[]}'
            MATRIX_V2=$(jq -c '.' matrix.json)
          fi

          # Export matrix to job outputs
          {
            echo 'matrix<<EOF'
            cat matrix.json
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          echo "matrix-v2=${MATRIX_V2}" >> "$GITHUB_OUTPUT"
          echo "matrix-v3=${MATRIX_V3}" >> "$GITHUB_OUTPUT"
          echo "has-v2=$(echo "$MATRIX_V2" | jq -c '.include | length > 0')" >> "$GITHUB_OUTPUT"
          echo "has-v3=$(echo "$MATRIX_V3" | jq -c '.include | length > 0')" >> "$GITHUB_OUTPUT"
