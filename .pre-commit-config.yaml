exclude: 'build'

default_language_version:
    python: python3

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 6306a48f7dae5861702d573c9c247e4e9498e867
    hooks:
    -   id: trailing-whitespace
    -   id: check-ast
    -   id: check-merge-conflict
    -   id: no-commit-to-branch
        args: ['--branch=main']
    -   id: check-added-large-files
        args: ['--maxkb=500']
    -   id: end-of-file-fixer
        exclude: '^(.*\.svg)$'

-   repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.4
    hooks:
    -   id: insert-license
        files: \.py$
        args:
        - --license-filepath
        - assets/license_header.txt

-   repo: https://github.com/pycqa/flake8
    rev: 34cbf8ef3950f43d09b85e2e45c15ae5717dc37b
    hooks:
    -   id: flake8
        additional_dependencies:
          - flake8-bugbear == 22.4.25
          - pep8-naming == 0.12.1
          - torchfix
          - flake8-pep585
          - flake8-new-union-types == 0.4.1
        args: ['--config=.flake8']

-   repo: https://github.com/omnilib/ufmt
    rev: v2.3.0
    hooks:
    -   id: ufmt
        additional_dependencies:
          - black == 22.12.0
          - usort == 1.0.5

- repo: https://github.com/jsh9/pydoclint
  rev: d88180a8632bb1602a4d81344085cf320f288c5a
  hooks:
    - id: pydoclint
      args: [--config=pyproject.toml]

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
  hooks:
    - id: codespell
      name: codespell
      description: Checks for common misspellings in text files.
      entry: codespell --toml pyproject.toml
      language: python
      types: [text]
      additional_dependencies:
        - tomli

- repo: https://github.com/facebook/pyrefly-pre-commit
  rev: 0.45.1
  hooks:
    - id: pyrefly-check
      name: Pyrefly (type checking)
      pass_filenames: false
      language: system


- repo: local
  hooks:
    # Hook 1: Check hyperlinks
    - id: lychee-local
      name: lychee-local
      language: system
      verbose: true
      entry: |
        /bin/bash -c '
        if ! command -v lychee >/dev/null 2>&1; then
            echo "--------------------------------------------------------"
            echo "Warning: Lychee (link checker) not found. skipping ... "
            echo "To enable local link checking, install Lychee:"
            echo "  - macos: brew install lychee"
            echo "  - linux/windows: https://github.com/lycheeverse/lychee"
            echo "--------------------------------------------------------"
            exit 0
        fi
        lychee "$@" $(find . -name "*.md" -not -path "./.*")
        ' --
      args:
        - "--offline"
        - "--no-progress"
        - "--exclude-path=/\\.[^/]+/"
        - "--root-dir=."
      pass_filenames: false
      always_run: true


    # Hook 2: Check hyperlinks and external links
    - id: lychee-ci
      name: lychee-ci
      language: system
      entry: |
        /bin/bash -c '
        if ! command -v lychee >/dev/null 2>&1; then
            echo "--------------------------------------------------------"
            echo "Warning: Lychee (link checker) not found. skipping ... "
            echo "To enable local link checking, install Lychee:"
            echo "  - macos: brew install lychee"
            echo "  - linux/windows: https://github.com/lycheeverse/lychee"
            echo ""
            echo "If this error occurred in CI (GitHub actions), ensure the "
            echo "installation step in lint.yaml is running correctly."
            echo "--------------------------------------------------------"
            exit 1
        fi
        lychee "$@"
        ' --
      args:
        - "--no-progress"
        - "--exclude-path=/\\.[^/]+/"
        - "--root-dir=."
        - "--accept=200,403,429,503"
        - "--exclude=http://localhost:.*"
        - "--exclude=http://127.0.0.1:.*"
        - "--max-retries=3"
        - "--retry-wait-time=5"
        - "--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
      stages: [manual]
      pass_filenames: true
      types_or: [markdown, python]
