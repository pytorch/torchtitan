# Tiny MoE model for smoke testing
# 4 layers, 8 experts, dim=512, 1024 ctx

model:
  n_layers: 4
  dim: 512
  n_heads: 8
  n_kv_heads: 2
  head_dim: 64
  num_experts: 8
  top_k: 2
  num_shared_experts: 1
  ffn_dim: 256

training:
  seq_len: 1024
  local_batch_size: 2
  grad_accum_steps: 1
  max_steps: 100
  warmup_steps: 10
  seed: 42

parallelism:
  dp_shard: -1
  ep: 4

data:
  tokenizer: "Qwen/Qwen2-7B"
  dataset_path: "./data/example"  # generated by scripts/make_example_dataset.py

logging:
  log_step: 1  # print metrics every step
  log_dump: "./outputs/moe_tiny/logs"

eval:
  enable: true
  dataset_path: "./data/example_eval"
  eval_step: 50  # run eval every 50 training steps

checkpoint:
  enable: false
  checkpoint_step: 50
  checkpoint_dump: "./outputs/moe_tiny/checkpoints"
