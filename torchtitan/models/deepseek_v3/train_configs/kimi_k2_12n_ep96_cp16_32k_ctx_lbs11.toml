# Kimi K2 - 12 nodes - EP=96, CP=16, LBS=11
#
# Original config: /home/phuc/worklogs/2026-01-30/cp16_sweep/configs/exp1acd_12n_ep96_cp16_lbs11.toml
# Job ID: 2307
#
# Expected Performance:
#   - TPS: 402
#   - Memory: 67.55 GiB (85.2%)
#   - MFU: 17.72%
#   - TFLOPS: ~175
#
# Parallelism: EP=96, CP=16, DP=1 (dp_replicate=1, dp_shard=1)
# Nodes: 12 (96 GPUs)
# Seq Length: 32768
# Local Batch Size: 11
#

[job]
dump_folder = "./outputs/kimi_k2/12n_ep96_cp16_lbs11"
description = "Kimi K2 - 12n EP=96 CP=16 LBS=11"

[profiling]
enable_profiling = false

[metrics]
log_freq = 1

[model]
name = "deepseek_v3"
flavor = "kimi_k2"
hf_assets_path = "/home/phuc/kimi_1t/torchtitan/assets/hf/DeepSeek-V3-Base"

[optimizer]
name = "AdamW"
lr = 2.2e-4
state_dtype = "bfloat16"

[lr_scheduler]
warmup_steps = 2
decay_ratio = 0.8

[training]
dtype = "bfloat16"
local_batch_size = 11
seq_len = 32768
steps = 5
dataset = "c4_test"
enable_cpu_offload = true
clear_cache_between_steps = true
skip_optimizer_step = false
# Aggressive memory management to reduce CUDA fragmentation
aggressive_memory_mode = "maximum"
aggressive_memory_verbose = true

[parallelism]
data_parallel_shard_degree = -1
expert_parallel_degree = 96
context_parallel_degree = 16

[activation_checkpoint]
mode = "full"

[compile]
enable = true
components = ["loss"]

[debug]
moe_force_load_balance = true

[comm]
init_timeout_seconds = 1800
train_timeout_seconds = 1800
