# Mini Kimi K2 with LLEP AUTOTUNE: same model as mini_kimi_k2_llep_ep8.toml
# but with autotune enabled to automatically find optimal LLEP hyperparameters.

[job]
dump_folder = "./outputs/mini_kimi_k2_llep_autotune_ep8"
description = "Mini Kimi K2: EP=8 SEQ=8K LBS=6 LLEP autotune, 256 experts top_k=8"

[profiling]
enable_profiling = false

[metrics]
log_freq = 1
disable_color_printing = true

[model]
name = "deepseek_v3"
flavor = "mini_kimi_k2_llep"
hf_assets_path = "./tests/assets/tokenizer"

[optimizer]
name = "Muon"
lr = 7e-6
eps = 1e-8
weight_decay = 0.01
beta1 = 0.9
beta2 = 0.95

mu = 0.95
algorithm = "muon"
nesterov = false
adjust_lr = "rms_norm"
flatten = false
use_triton = true

scalar_optimizer = "adamw"
embedding_optimizer = "adamw"
head_optimizer = "adamw"
head_lr_scaling = false

scalar_lr_factor = 1
embedding_lr_factor = 1
head_lr_factor = 1.0
routing_lr_factor = 1.0
expert_lr_factor = 1.0

[lr_scheduler]
warmup_steps = 20
decay_ratio = 0.8
decay_type = "linear"
min_lr_factor = 0.0

[training]
dtype = "bfloat16"
local_batch_size = 6
seq_len = 8192
max_norm = 1.0
steps = 1000
dataset = "c4_test"
enable_cpu_offload = true
clear_cache_between_steps = true
skip_optimizer_step = false
aggressive_memory_mode = "maximum"
aggressive_memory_verbose = true

[parallelism]
data_parallel_shard_degree = -1
expert_parallel_degree = 8
context_parallel_degree = 1

[activation_checkpoint]
mode = "full"

[compile]
enable = true
components = ["loss"]

# LLEP with autotune: automatically finds optimal α, m, λ from real routing stats
[llep]
enabled = true
autotune = true
autotune_samples = 3

[debug]
moe_force_load_balance = false

[comm]
init_timeout_seconds = 1800
train_timeout_seconds = 1800
