# DeepSeek-V3 debug model: ~3B params, 64 experts, EP=8, top_k=8, LLEP
# 12 layers (1 dense + 11 MoE), dim=1024, moe_inter_dim=768
# Sized to fit on 8xB200 with lbs=6, seq_len=4096 on new upstream
#
# Run with LLEP:
#   torchrun --nproc_per_node=8 -m torchtitan.train \
#     --job.config-file torchtitan/models/deepseek_v3/train_configs/debug_model_ep8_llep_3b.toml \
#     --training.steps 20 --compile.no-enable
#
# Run without LLEP (baseline):
#   torchrun --nproc_per_node=8 -m torchtitan.train \
#     --job.config-file torchtitan/models/deepseek_v3/train_configs/debug_model_ep8_llep_3b.toml \
#     --training.steps 20 --compile.no-enable --llep.enabled=False

[job]
dump_folder = "./outputs"
description = "DeepSeek-V3 3B debug EP=8 LLEP benchmark"
print_config = false

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = false
save_tb_folder = "tb"
enable_wandb = false

[model]
name = "deepseek_v3"
flavor = "debugmodel_ep8_llep_3b"
# test tokenizer, for debug purpose only
hf_assets_path = "./tests/assets/tokenizer"

[optimizer]
name = "AdamW"
lr = 8e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 2
decay_ratio = 0.8
decay_type = "linear"
min_lr_factor = 0.0

[training]
local_batch_size = 6
seq_len = 4096
max_norm = 1.0
steps = 5
dataset = "c4_test"
skip_optimizer_step = false
clear_cache_between_steps = false

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 1
enable_async_tensor_parallel = false
pipeline_parallel_degree = 1
pipeline_parallel_schedule = "1F1B"
context_parallel_degree = 1
expert_parallel_degree = 8
expert_tensor_parallel_degree = 1
expert_parallel_comm_backend = "standard"

[checkpoint]
enable = false
folder = "checkpoint"
interval = 10
last_save_model_only = false
export_dtype = "float32"
async_mode = "disabled"

[activation_checkpoint]
mode = "none"

[compile]
enable = false
components = ["model", "loss"]

[llep]
enabled = true
min_tokens_per_gemm = 1
adaptive_threshold = 0.0
verbose = false

[debug]
moe_force_load_balance = false
