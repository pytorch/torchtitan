# Debug LLEP with DP=2: 8 GPUs, EP=4, num_experts=8 → num_local_experts=2, DP=2
# Reproduces the IndexError when FSDP shards expert weights

[job]
dump_folder = "./outputs/debug_llep_dp2"
description = "Debug LLEP with DP=2 to reproduce IndexError"
print_config = false

[profiling]
enable_profiling = false

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = false
enable_wandb = false

[model]
name = "deepseek_v3"
flavor = "debugmodel_llep"
hf_assets_path = "./tests/assets/tokenizer"

[optimizer]
name = "AdamW"
lr = 8e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 2
decay_ratio = 0.8
decay_type = "linear"
min_lr_factor = 0.0

[training]
local_batch_size = 1
seq_len = 256
max_norm = 1.0
steps = 5
dataset = "c4_test"
enable_cpu_offload = true

[parallelism]
data_parallel_replicate_degree = 2
data_parallel_shard_degree = -1
expert_parallel_degree = 4
context_parallel_degree = 1

[checkpoint]
enable = false

[activation_checkpoint]
mode = "none"

[compile]
enable = false

[debug]
moe_force_load_balance = false
