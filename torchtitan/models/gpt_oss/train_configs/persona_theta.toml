[job]
dump_folder = "./outputs/persona_theta"
description = "GPT-OSS 20B persona_theta fine-tuning (131K context via YaRN)"
print_config = true

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 100
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 5
disable_color_printing = false
enable_tensorboard = true
save_tb_folder = "tb_persona_theta"
enable_wandb = false

[model]
name = "gpt_oss"
flavor = "20b"
hf_assets_path = "./outputs/gpt-oss-20b"

[optimizer]
name = "AdamW"
lr = 1e-5
eps = 1e-8
weight_decay = 0.01
cpu_offload = true

[optimizer.lr_multipliers]
embeddings = 0.1
output = 1.0
attention = 1.0
experts = 1.0
routers = 0.1
norms = 0.1
bias = 1.0

[optimizer.weight_decay_multipliers]
embeddings = 0.0
output = 1.0
attention = 1.0
experts = 1.0
routers = 1.0
norms = 0.0
bias = 0.0

[lr_scheduler]
warmup_steps = 40
decay_ratio = 0.7
decay_type = "cosine"
min_lr_factor = 0.3

[training]
local_batch_size = 1
global_batch_size = 8
seq_len = 131072
max_norm = 1.0
steps = 399
dataset = "persona_theta"
pack_samples = true
pad_samples = false
add_bos_eos = false
mask_non_assistant = true
gc_freq = 60
freeze_router_bias = true
freeze_expert_bias = true
dtype = "bfloat16"
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "float32"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 4
enable_async_tensor_parallel = false
expert_parallel_degree = 1
expert_tensor_parallel_degree = 1

[checkpoint]
enable = true
folder = "checkpoint_persona_theta"
interval = 134
enable_first_step_checkpoint = false
last_save_model_only = false
export_dtype = "float32"
async_mode = "disabled"
initial_load_path = "./outputs/gpt-oss-20b"
initial_load_in_hf = true
initial_load_in_hf_quantized = true

[activation_checkpoint]
mode = "selective"
selective_ac_option = '1'

[compile]
enable = true

[validation]
enable = false
dataset = "c4_validation"
freq = 250
steps = 50
