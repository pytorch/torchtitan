[job]
dump_folder = "./outputs/profile_20b_32k"
description = "GPT-OSS 20B memory profiling (32K seq_len, 2 GPUs)"
print_config = true

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 1
enable_memory_snapshot = true
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = false
enable_wandb = false

[model]
name = "gpt_oss"
flavor = "20b"
hf_assets_path = "./outputs/gpt-oss-20b"

[optimizer]
name = "AdamW"
lr = 1e-5
eps = 1e-8
weight_decay = 0.01
cpu_offload = true

[optimizer.lr_multipliers]
embeddings = 0.1
output = 1.0
attention = 1.0
experts = 1.0
routers = 0.1
norms = 0.1
bias = 1.0

[optimizer.weight_decay_multipliers]
embeddings = 0.0
output = 1.0
attention = 1.0
experts = 1.0
routers = 1.0
norms = 0.0
bias = 0.0

[lr_scheduler]
warmup_steps = 0
decay_ratio = 0.0
decay_type = "cosine"
min_lr_factor = 1.0

[training]
local_batch_size = 1
global_batch_size = 2
seq_len = 32768
max_norm = 1.0
steps = 3
dataset = "persona_iota"
pack_samples = true
pad_samples = false
add_bos_eos = false
mask_non_assistant = true
gc_freq = 60
freeze_router_bias = true
freeze_expert_bias = false
dtype = "bfloat16"
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "float32"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 2
enable_async_tensor_parallel = false
expert_parallel_degree = 1
expert_tensor_parallel_degree = 1

[checkpoint]
enable = true
folder = "checkpoint_profile_20b_32k"
interval = 9999
enable_first_step_checkpoint = false
last_save_model_only = false
export_dtype = "float32"
async_mode = "disabled"
initial_load_path = "./outputs/gpt-oss-20b"
initial_load_in_hf = true
initial_load_in_hf_quantized = true

[activation_checkpoint]
mode = "selective"
selective_ac_option = '1'

[compile]
enable = true

[validation]
enable = false
