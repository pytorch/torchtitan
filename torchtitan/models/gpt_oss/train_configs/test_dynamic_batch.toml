# Test config for dynamic batching - based on persona_iota.toml
# Run: NGPU=2 CONFIG_FILE=torchtitan/models/gpt_oss/train_configs/test_dynamic_batch.toml ./run_train.sh
# NOTE: seq_len=32768 for TP=2. At TP=2, 131k logits = 122 GiB > 96 GiB (OOMs).
#       For production TP=4, use seq_len=131072 (logits = ~66 GiB, fits).

[job]
dump_folder = "./outputs/test_dynamic_batch"
description = "GPT-OSS 20B dynamic batch test (short run)"
print_config = true

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 100
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = false
enable_wandb = false

[model]
name = "gpt_oss"
flavor = "20b"
hf_assets_path = "./outputs/gpt-oss-20b"

[optimizer]
name = "AdamW"
lr = 1e-5
eps = 1e-8
weight_decay = 0.01
cpu_offload = true

[optimizer.lr_multipliers]
embeddings = 1.0
output = 1.0
attention = 1.0
experts = 1.0
routers = 1.0
norms = 1.0
bias = 1.0

[optimizer.weight_decay_multipliers]
embeddings = 0.0
output = 1.0
attention = 1.0
experts = 1.0
routers = 1.0
norms = 0.0
bias = 0.0

[lr_scheduler]
warmup_steps = 2
decay_ratio = 0.5
decay_type = "cosine"
min_lr_factor = 0.3

[training]
local_batch_size = 1
global_batch_size = 2
seq_len = 32768
max_norm = 1.0
steps = 10
dataset = "persona_iota"
pack_samples = false
pad_samples = false
dynamic_batch = true
dynamic_batch_alignment = 128
dynamic_batch_max_levels = 12
# Empty = auto-calibrate from data distribution:
# dynamic_batch_buckets = []
add_bos_eos = false
mask_non_assistant = true
gc_freq = 60
freeze_router_bias = false
freeze_expert_bias = false
dtype = "bfloat16"
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "float32"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 2
enable_async_tensor_parallel = false
expert_parallel_degree = 1
expert_tensor_parallel_degree = 1

[checkpoint]
enable = true
folder = "checkpoint_dynamic_batch_test"
interval = 9999
initial_load_path = "./outputs/gpt-oss-20b"
initial_load_model_only = true
initial_load_in_hf = true
initial_load_in_hf_quantized = true
enable_first_step_checkpoint = false
last_save_model_only = false

[activation_checkpoint]
mode = "selective"
selective_ac_option = '1'

[compile]
enable = true

[validation]
enable = false
