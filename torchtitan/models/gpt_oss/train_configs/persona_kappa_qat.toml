[job]
dump_folder = "./outputs/persona_kappa_qat"
description = "GPT-OSS 20B persona_kappa QAT (NVFP4 W4A4 MLP, from fine-tuned checkpoint)"
print_config = true

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 100
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = true
save_tb_folder = "tb_persona_kappa_qat"
enable_wandb = false

[model]
name = "gpt_oss"
flavor = "20b"
hf_assets_path = "./outputs/gpt-oss-20b"

[optimizer]
name = "AdamW"
lr = 5e-6
eps = 1e-8
weight_decay = 0.01
cpu_offload = true

[optimizer.lr_multipliers]
embeddings = 1.0
output = 1.0
attention = 1.0
experts = 1.0
routers = 0.1
norms = 0.1
bias = 1.0

[optimizer.weight_decay_multipliers]
embeddings = 0.0
output = 1.0
attention = 1.0
experts = 1.0
routers = 1.0
norms = 0.0
bias = 0.0

[lr_scheduler]
warmup_steps = 10
decay_ratio = 0.5
decay_type = "cosine"
min_lr_factor = 0.3

[training]
local_batch_size = 1
global_batch_size = 16
seq_len = 131072
max_norm = 1.0
steps = 100
dataset = "persona_kappa"
dynamic_batch = false
pack_samples = true
pad_samples = false
add_bos_eos = false
mask_non_assistant = true
gc_freq = 60
freeze_router_bias = false
freeze_expert_bias = false
expert_orthogonality_coeff = 0.0
dtype = "bfloat16"
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "float32"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 4
enable_async_tensor_parallel = false
expert_parallel_degree = 1
expert_tensor_parallel_degree = 1

[checkpoint]
enable = true
folder = "checkpoint_persona_kappa_qat"
interval = 50
enable_first_step_checkpoint = false
last_save_model_only = false
export_dtype = "float32"
async_mode = "disabled"
# Load from the fine-tuned persona_kappa checkpoint (not raw HF weights)
# Must point to specific step dir containing .metadata and .distcp files
initial_load_path = "./outputs/persona_kappa/checkpoint_persona_kappa_v2/step-441"
initial_load_model_only = true

[activation_checkpoint]
mode = "selective"
selective_ac_option = '1'

[compile]
enable = true

[qat]
enable = true
config = "NVFP4_MLP_ONLY_CFG"
calib_steps = 32

[validation]
enable = false
dataset = "c4_validation"
freq = 50
steps = 50
